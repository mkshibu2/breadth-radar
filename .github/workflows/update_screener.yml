name: Daily VCP Screener Update

on:
  # Runs automatically at 11:30 AM UTC (5:00 PM IST) Monday through Friday
  schedule:
    - cron: '30 11 * * 1-5'
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas openpyxl

      - name: Execute VCP Scanner
        run: python vcp_scanner.py

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add vcp_scanner_results.html vcp_scanner_results.xlsx
          # Only commit if there are changes to avoid failing the workflow
          git diff-index --quiet HEAD || git commit -m "Automated Daily VCP Screener Update"
          git push
