name: Daily VCP Scanner

on:
  schedule:
    # Runs at 5:00 PM IST (11:30 AM UTC) Monday-Friday.
    - cron: '30 11 * * 1-5'
  workflow_dispatch: # Allows you to manually click "Run workflow"

# FIX 1: Explicitly grant write permissions so it can push the HTML file (Prevents 128)
permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    # FIX 2: Opt into Node.js 24 to clear the deprecation warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # FIX 3: Bump setup-python to v5 (which natively supports newer Node versions)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy openpyxl

      - name: Run VCP Scanner Script
        run: python vcp_scanner.py

      - name: Commit and Push Results
        run: |
          # Configure the Git bot identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage both the HTML report AND the sector breadth JSON sidecar
          git add vcp_scanner_results.html
          git add sector_breadth.json

          # FIX 4: Only commit and push IF there are actual changes (Prevents 128)
          if ! git diff --cached --quiet; then
            git commit -m "📊 Auto-updated VCP Scanner Results"
            git push
            echo "✅ Changes pushed to GitHub successfully."
          else
            echo "⏸️ No changes detected in the watchlist today. Skipping commit."
          fi
